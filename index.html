<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clock & Crown Members</title>

<style>
*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  background:transparent;
  color:#f8e7a2;
  font-family:Arial,sans-serif;
  overflow:hidden;
}

.board{
  width:100%;
  padding:10px;
  border:1px solid rgba(212,175,55,.65);
  border-radius:18px;
  background:linear-gradient(180deg,#070707,#000);
  box-shadow:0 0 12px rgba(212,175,55,.22);
}

.title{
  margin:0 0 8px;
  font-family:Georgia,serif;
  font-size:22px;
  color:#ffe27a;
  text-align:center;
}

.members{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.member{
  display:flex;
  align-items:center;
  gap:9px;
  padding:9px;
  border-radius:13px;
  text-decoration:none;
  background:linear-gradient(90deg,rgba(50,38,5,.95),rgba(8,8,8,.96));
  border:1px solid rgba(212,175,55,.3);
}

.avatar{
  width:38px;
  height:38px;
  border-radius:50%;
  object-fit:cover;
  border:1px solid #d4af37;
  background:#111;
  flex-shrink:0;
}

.info{
  flex:1;
  min-width:0;
}

.username{
  font-size:14px;
  font-weight:700;
  color:#fff4bd;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.meta{
  margin-top:2px;
  font-size:12px;
  color:#c9ad56;
}

.elo{
  font-size:12px;
  font-weight:700;
  color:#ffe27a;
  white-space:nowrap;
}

.status{
  padding:10px;
  border-radius:12px;
  text-align:center;
  font-size:13px;
  color:#f5dd8b;
  background:rgba(212,175,55,.08);
}
</style>
</head>

<body>

<div class="board">
  <h2 class="title">👑 Newest Members</h2>
  <div id="members" class="members">
    <div class="status">Loading members...</div>
  </div>
</div>

<script>
const CLUB_SLUG = "clock-and-crown";
const MEMBER_LIMIT = 3;

const membersBox = document.getElementById("members");

async function getJson(url){
  const res = await fetch(url);
  if(!res.ok) throw new Error("Fetch failed");
  return res.json();
}

async function loadMembers(){
  try{
    const data = await getJson(`https://api.chess.com/pub/club/${CLUB_SLUG}/members`);

    const all = [
      ...(data.weekly || []),
      ...(data.monthly || []),
      ...(data.all_time || [])
    ];

    const seen = new Set();

    const newest = all
      .filter(m=>{
        const name = m.username?.toLowerCase();
        if(!name || seen.has(name)) return false;
        seen.add(name);
        return true;
      })
      .sort((a,b)=>(b.joined || 0)-(a.joined || 0))
      .slice(0,MEMBER_LIMIT);

    const enriched = await Promise.all(newest.map(async member=>{
      const rating = await getHighestRating(member.username);
      return {...member, highestRating: rating};
    }));

    render(enriched);

  }catch(e){
    membersBox.innerHTML = `<div class="status">Board unavailable right now.</div>`;
  }
}

async function getHighestRating(username){
  try{
    const stats = await getJson(`https://api.chess.com/pub/player/${username}/stats`);

    const ratings = [
      stats.chess_rapid?.last?.rating,
      stats.chess_blitz?.last?.rating,
      stats.chess_bullet?.last?.rating,
      stats.chess_daily?.last?.rating
    ].filter(Boolean);

    return ratings.length ? Math.max(...ratings) : "N/A";
  }catch(e){
    return "N/A";
  }
}

function render(members){
  if(!members.length){
    membersBox.innerHTML = `<div class="status">No members found.</div>`;
    return;
  }

  membersBox.innerHTML = members.map(member=>{
    const avatar = member.avatar || "https://www.chess.com/bundles/web/images/noavatar_l.84a92436.gif";
    const profile = member.url || `https://www.chess.com/member/${member.username}`;
    const joined = member.joined
      ? new Date(member.joined * 1000).toLocaleDateString()
      : "New";

    return `
      <a class="member" href="${profile}" target="_blank" rel="noopener">
        <img class="avatar" src="${avatar}" alt="${member.username}">
        <div class="info">
          <div class="username">${member.username}</div>
          <div class="meta">Joined ${joined}</div>
        </div>
        <div class="elo">⭐ ${member.highestRating}</div>
      </a>
    `;
  }).join("");
}

loadMembers();
</script>

</body>
</html>
