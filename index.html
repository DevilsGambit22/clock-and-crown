<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Clock & Crown New Members</title>

<style>
* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  padding: 0;
  background: transparent;
  font-family: Arial, sans-serif;
  color: #f8e7a2;
  overflow: hidden;
}

.board {
  width: 100%;
  padding: 14px;
  border: 1px solid rgba(212, 175, 55, 0.7);
  border-radius: 22px;
  background:
    radial-gradient(circle at top, rgba(255, 220, 90, 0.14), transparent 38%),
    linear-gradient(180deg, #050505 0%, #000000 100%);
  box-shadow:
    0 0 18px rgba(212, 175, 55, 0.25),
    inset 0 0 20px rgba(212, 175, 55, 0.06);
}

h2 {
  margin: 0;
  font-family: Georgia, serif;
  font-size: 27px;
  color: #ffe27a;
  text-shadow: 0 0 10px rgba(255, 226, 122, 0.35);
}

.tagline {
  margin: 6px 0 14px;
  font-size: 14px;
  color: #d7bf6a;
}

.members {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.member {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px;
  border-radius: 16px;
  text-decoration: none;
  background: linear-gradient(90deg, rgba(45, 35, 5, 0.96), rgba(8, 8, 8, 0.98));
  border: 1px solid rgba(212, 175, 55, 0.35);
  box-shadow: inset 0 0 12px rgba(255, 215, 80, 0.05);
}

.avatar {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid #d4af37;
  background: #111;
  flex-shrink: 0;
}

.info {
  min-width: 0;
}

.username {
  font-size: 17px;
  font-weight: 700;
  color: #fff4bd;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.joined {
  margin-top: 3px;
  font-size: 13px;
  color: #c9ad56;
}

.status {
  padding: 14px;
  border-radius: 14px;
  background: rgba(212, 175, 55, 0.08);
  border: 1px solid rgba(212, 175, 55, 0.25);
  color: #f5dd8b;
  text-align: center;
  font-size: 14px;
}

@media (max-width: 420px) {
  .board {
    padding: 12px;
    border-radius: 18px;
  }

  h2 {
    font-size: 24px;
  }

  .member {
    padding: 11px;
  }

  .avatar {
    width: 42px;
    height: 42px;
  }

  .username {
    font-size: 16px;
  }
}
</style>
</head>

<body>

<div class="board">
  <h2>👑 Newest Members</h2>
  <p class="tagline">Fresh arrivals to Clock & Crown.</p>

  <div id="members" class="members">
    <div class="status">Loading newest members...</div>
  </div>
</div>

<script>
const CLUB_SLUG = "clock-and-crown";
const MEMBER_LIMIT = 3;

const membersBox = document.getElementById("members");

async function loadNewestMembers() {
  try {
    const response = await fetch(`https://api.chess.com/pub/club/${CLUB_SLUG}/members`);

    if (!response.ok) {
      throw new Error("Chess.com API failed");
    }

    const data = await response.json();

    const allMembers = [
      ...(data.weekly || []),
      ...(data.monthly || []),
      ...(data.all_time || [])
    ];

    const seen = new Set();

    const uniqueMembers = allMembers.filter(member => {
      const username = member.username?.toLowerCase();
      if (!username || seen.has(username)) return false;
      seen.add(username);
      return true;
    });

    const newestMembers = uniqueMembers
      .sort((a, b) => (b.joined || 0) - (a.joined || 0))
      .slice(0, MEMBER_LIMIT);

    renderMembers(newestMembers);

  } catch (error) {
    membersBox.innerHTML = `
      <div class="status">
        New member board unavailable right now.
      </div>
    `;
  }
}

function renderMembers(members) {
  if (!members.length) {
    membersBox.innerHTML = `
      <div class="status">
        No members found yet.
      </div>
    `;
    return;
  }

  membersBox.innerHTML = members.map(member => {
    const joinedDate = member.joined
      ? new Date(member.joined * 1000).toLocaleDateString()
      : "Recently joined";

    const avatar = member.avatar || "https://www.chess.com/bundles/web/images/noavatar_l.84a92436.gif";
    const profile = member.url || `https://www.chess.com/member/${member.username}`;

    return `
      <a class="member" href="${profile}" target="_blank" rel="noopener">
        <img class="avatar" src="${avatar}" alt="${member.username}">
        <div class="info">
          <div class="username">${member.username}</div>
          <div class="joined">Joined ${joinedDate}</div>
        </div>
      </a>
    `;
  }).join("");
}

loadNewestMembers();
</script>

</body>
</html>
